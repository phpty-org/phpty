name: CI

on:
  push:
  pull_request:

# Hybrid CI (ADR-0013): PHP comes from setup-php — fast, and every version
# including the ones nixpkgs refuses as EOL — while libghostty-vt still comes
# from the flake, built once per OS and shared as an artifact. The drift ADR-0008
# feared does not return: both dev and CI get the library from the same
# `nix build .#libghostty-vt`, pinned by flake.lock. `nix develop` stays the dev
# shell.
jobs:
  libghostty:
    name: build libghostty-vt / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # The one slow, nix-built thing — done once per OS, not once per PHP.
      # cp -L dereferences the store symlinks so the artifact is plain files.
      - name: build and stage the pinned library
        run: |
          nix build .#libghostty-vt
          mkdir -p libghostty-lib
          cp -RL result/lib/. libghostty-lib/

      - uses: actions/upload-artifact@v4
        with:
          name: libghostty-${{ matrix.os }}
          path: libghostty-lib
          retention-days: 1

  test:
    name: PHP ${{ matrix.php }} on ${{ matrix.os }}
    needs: libghostty
    runs-on: ${{ matrix.os }}
    # Bounds a stuck Subject on a pty. A job-level limit works on every runner;
    # the `timeout` command does not exist on the macOS runners.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # The modern source's floor is 8.2 (ADR-0003); nixpkgs would cap us there
        # too, but setup-php lets us cover the whole range at speed.
        php: ['8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: libghostty-${{ matrix.os }}
          path: libghostty-lib

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ffi, mbstring, pcntl, posix
          coverage: none
          tools: composer

      # The ADR-0002 claim, checked on every push against the pinned library: PHP
      # can dlopen it and it measures width the way the ADRs say.
      - name: libghostty-vt loads and measures width
        run: |
          export PHPTY_LIBGHOSTTY_VT="$PWD/libghostty-lib"
          php -r '
            $ext = PHP_OS_FAMILY === "Darwin" ? "dylib" : "so";
            $ffi = FFI::cdef(
              "uint8_t ghostty_unicode_codepoint_width(uint32_t cp);",
              getenv("PHPTY_LIBGHOSTTY_VT") . "/libghostty-vt." . $ext
            );
            $expected = [0x0061 => 1, 0x65E5 => 2, 0x3042 => 2, 0xFF21 => 2, 0x2192 => 1];
            foreach ($expected as $cp => $want) {
              if ($ffi->ghostty_unicode_codepoint_width($cp) !== $want) {
                fwrite(STDERR, sprintf("U+%04X: expected %d\n", $cp, $want));
                exit(1);
              }
            }
            echo "libghostty-vt width table matches the ADRs\n";
          '

      # The PHPUnit-Polyfills span (ADR-0010): the pinned bin lock is PHPUnit 12
      # (8.3+), so re-resolve per PHP — 8.2 gets 11, 8.4 gets 12 — and let the
      # polyfills bridge them. A stuck Subject is bounded by the job's
      # timeout-minutes above.
      - name: test suite
        run: |
          export PHPTY_LIBGHOSTTY_VT="$PWD/libghostty-lib"
          composer install --no-interaction
          composer bin phpunit update --no-interaction --no-audit
          vendor-bin/phpunit/vendor/bin/phpunit

  module-deps:
    name: prefer-lowest / ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [vterm, pty, screen-test]
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          # Present so composer's platform check passes; the module requires them,
          # even though resolution runs no FFI.
          extensions: ffi, mbstring, pcntl, posix
          coverage: none
          tools: composer

      # Each module is a standalone package; this checks it validates and resolves
      # at the LOWEST versions of its dependencies — no libghostty needed, so no
      # nix. Siblings are not on Packagist yet (publication deferred), so they are
      # linked by path; every module shares one untagged branch, so `self.version`
      # resolves to dev-main with no branch alias. The path repos are injected here
      # only, never in the shipped composer.json.
      - name: validate and resolve at floor
        run: |
          set -e
          cd ${{ matrix.module }}
          composer validate --strict --no-check-publish --no-check-lock
          for sib in vterm pty screen-test; do
            [ "$sib" = "${{ matrix.module }}" ] && continue
            composer config repositories."$sib" path ../"$sib"
          done
          composer update --prefer-lowest --prefer-stable

  downgrade:
    name: downgrade to PHP 7.4 applies cleanly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          # The root package requires ext-ffi, so composer install checks for it.
          extensions: ffi
          coverage: none
          tools: composer

      # Guards the release downgrade config (ADR-0009): the modern source must stay
      # lowerable to 7.4 without Rector erroring — this is what caught the
      # MHASH_XXH32 rule crash. Rector transforms source only, so no libghostty and
      # no nix. `composer install` first, so the bin-plugin exists before `bin`.
      - name: rector downgrade applies without error
        run: |
          set -e
          composer install --no-interaction
          composer bin rector install --no-interaction
          vendor-bin/rector/vendor/bin/rector process --config build/rector-downgrade.php --no-progress-bar

  test-74:
    name: downgraded suite on real PHP 7.4
    runs-on: ubuntu-latest
    # The whole point: run the SHIPPED (downgraded) code on the version it ships
    # for. This is where a 7.4-only fault surfaces on every push — as the FFI
    # struct-by-value one did, but in the release, after a wasted publish attempt.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Rector runs on the flake's modern PHP to downgrade; the suite then runs on
      # a real 7.4 from setup-php. Two PHP versions in one job — nix for the first,
      # setup-php for the second.
      - name: downgrade to PHP 7.4
        run: |
          nix develop .#default --command bash -c '
            set -e
            composer install --no-interaction
            composer bin rector install --no-interaction
            vendor-bin/rector/vendor/bin/rector process --config build/rector-downgrade.php --no-progress-bar
            composer require --no-update "php:^7.4 || ^8.0"
          '

      - name: build the pinned libghostty-vt
        run: echo "PHPTY_LIBGHOSTTY_VT=$(nix build .#libghostty-vt --print-out-paths)/lib" >> "$GITHUB_ENV"

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: ffi, mbstring, pcntl, posix
          coverage: none

      - name: run the downgraded suite on 7.4
        run: |
          php -v
          composer update --no-audit
          composer bin phpunit update --no-audit
          vendor-bin/phpunit/vendor/bin/phpunit
