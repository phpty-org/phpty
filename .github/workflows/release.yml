name: Release

# Manual, and it PUBLISHES. It downgrades the tree to PHP 7.4, verifies it on a
# real 7.4, then force-updates the read-only split repositories
# (phpty-org/{vterm,pty,screen-test}) with that code and the given tag — the same
# tag on every module (lockstep, ADR-0009).
#
# Prerequisites, both out of band:
#   - a SPLIT_TOKEN secret: a token with push access to the split repositories
#   - each package registered on Packagist once, so its webhook then tracks the
#     split repo. Registration is not done here.
#
# See docs/adr/0009-downgrade-on-release-with-rector.md.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version to release, e.g. v0.1.0 (applied to every module)"
        required: true

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history: the subtree split needs it

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Downgrade the whole tree to 7.4 with Rector, and lower the root php
      # constraint so the tree installs on 7.4 for the verification below. The
      # module composer.json files already declare ^7.4 || ^8.0 and are what ship.
      - name: downgrade to PHP 7.4
        run: |
          nix develop .#default --command bash -c '
            set -e
            composer install --no-interaction
            composer bin rector install --no-interaction
            vendor-bin/rector/vendor/bin/rector process --config build/rector-downgrade.php --no-progress-bar
            composer require --no-update "php:^7.4 || ^8.0"
          '

      # setup-php gives the real 7.4; nix gives the exact pinned libghostty. They
      # meet on this env var (ADR-0008/0013).
      - name: build the pinned libghostty-vt
        run: echo "PHPTY_LIBGHOSTTY_VT=$(nix build .#libghostty-vt --print-out-paths)/lib" >> "$GITHUB_ENV"

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: ffi, mbstring, pcntl, posix
          coverage: none

      # The ship inspection: the downgraded suite on a real 7.4, which nixpkgs
      # cannot provide. The bin lock pins PHPUnit 12 (8.3+), so re-resolve here,
      # where 7.4 picks 9.6; the polyfills bridge them (ADR-0010).
      - name: verify the downgraded suite on real 7.4
        run: |
          php -v
          composer update --no-audit
          composer bin phpunit update --no-audit
          vendor-bin/phpunit/vendor/bin/phpunit

      # Commit the downgrade so the subtree split has it at its tip. This commit
      # is local to the runner — it is never pushed to the monorepo.
      - name: commit the downgraded tree
        run: |
          git config user.name "USAMI Kenta"
          git config user.email "tadsan@zonu.me"
          git add -A
          git commit -m "Release ${{ github.event.inputs.tag }} (downgraded to PHP 7.4)"

      - name: split → phpty-org/vterm
        uses: symplify/monorepo-split-github-action@v2.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.SPLIT_TOKEN }}
        with:
          package_directory: vterm
          repository_organization: phpty-org
          repository_name: vterm
          user_name: "USAMI Kenta"
          user_email: "tadsan@zonu.me"
          branch: main
          tag: ${{ github.event.inputs.tag }}

      - name: split → phpty-org/pty
        uses: symplify/monorepo-split-github-action@v2.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.SPLIT_TOKEN }}
        with:
          package_directory: pty
          repository_organization: phpty-org
          repository_name: pty
          user_name: "USAMI Kenta"
          user_email: "tadsan@zonu.me"
          branch: main
          tag: ${{ github.event.inputs.tag }}

      - name: split → phpty-org/screen-test
        uses: symplify/monorepo-split-github-action@v2.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.SPLIT_TOKEN }}
        with:
          package_directory: screen-test
          repository_organization: phpty-org
          repository_name: screen-test
          user_name: "USAMI Kenta"
          user_email: "tadsan@zonu.me"
          branch: main
          tag: ${{ github.event.inputs.tag }}
