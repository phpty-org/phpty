name: Release (dry-run)

# Publication is deferred. This workflow EXECUTES the downgrade and the real
# PHP 7.4 validation; the split and Packagist steps are placeholders. When ready
# to publish, add a `push: tags: ['v*']` trigger and turn on the split job.
# See docs/adr/0009-downgrade-on-release-with-rector.md.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  downgrade-and-verify:
    name: downgrade to 7.4 and verify on real 7.4
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Downgrade the whole tree to 7.4 with Rector, then lower the root php
      # constraint so the tree installs on 7.4. Modules already declare
      # ^7.4 || ^8.0; only the dev root says ^8.1. This mirrors the blog's "copy
      # the 7.4 composer" step (ADR-0009). Runs on the flake's PHP.
      - name: downgrade to PHP 7.4
        run: |
          nix develop .#default --command bash -c '
            set -e
            vendor-bin/rector/vendor/bin/rector process --config build/rector-downgrade.php --no-progress-bar
            composer require --no-update "php:^7.4 || ^8.0"
          '

      # setup-php gives real 7.4 + FFI but no libghostty; nix gives the exact
      # pinned library. The two environments meet on this env var (ADR-0008).
      - name: build pinned libghostty-vt
        run: |
          echo "PHPTY_LIBGHOSTTY_VT=$(nix build .#libghostty-vt --print-out-paths)/lib" >> "$GITHUB_ENV"

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: ffi
          coverage: none

      # The ship inspection: run the downgraded suite on a real 7.4, the thing
      # nixpkgs cannot provide (ADR-0008/0009). The phpunit bin lock is pinned to
      # 12 (resolved on modern PHP), which 7.4 cannot install — so re-resolve the
      # bin here, where it picks PHPUnit 9.6; the polyfills bridge the two
      # (ADR-0010).
      - name: verify on PHP 7.4
        run: |
          php -v
          composer update --no-audit
          composer bin phpunit update --no-audit
          vendor-bin/phpunit/vendor/bin/phpunit

  split:
    name: split to per-module repos (placeholder)
    needs: downgrade-and-verify
    runs-on: ubuntu-latest
    steps:
      # Deferred. Documents the shape without publishing anything. To enable:
      # the downgrade job commits its result to a `release` branch, this job runs
      # splitsh over that branch per module, and each split repo receives the same
      # tag. Packagist then updates each by webhook.
      - name: what this will do (not yet)
        run: |
          echo "Publication is deferred — nothing is pushed."
          echo "When enabled, per module (vterm, pty, screen-test):"
          echo "  splitsh-lite --prefix=<module> --target=heads/split-<module>"
          echo "  push split-<module> -> phpty-org/<module>, tag \${{ github.ref_name }}"
          echo "Lockstep: one monorepo tag becomes the same tag in every split repo."
