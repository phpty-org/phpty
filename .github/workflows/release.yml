name: Release

# Manual, and it PUBLISHES. It downgrades the tree to PHP 7.4, verifies it on a
# real 7.4, then force-updates the read-only split repositories
# (phpty-org/{vterm,pty,screen-test}) with that code and the given tag — the same
# tag on every module (lockstep, ADR-0009).
#
# Prerequisites, both out of band:
#   - a SPLIT_TOKEN secret: a token with push access to the split repositories
#   - each package registered on Packagist once, so its webhook then tracks the
#     split repo. Registration is not done here.
#
# See docs/adr/0009-downgrade-on-release-with-rector.md.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version to release, e.g. v0.1.0 (applied to every module)"
        required: true

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      # Downgrade the whole tree to 7.4 with Rector, and lower the root php
      # constraint so the tree installs on 7.4 for the verification below. The
      # module composer.json files already declare ^7.4 || ^8.0 and are what ship.
      - name: downgrade to PHP 7.4
        run: |
          nix develop .#default --command bash -c '
            set -e
            composer install --no-interaction
            composer bin rector install --no-interaction
            vendor-bin/rector/vendor/bin/rector process --config build/rector-downgrade.php --no-progress-bar
            composer require --no-update "php:^7.4 || ^8.0"
          '

      # setup-php gives the real 7.4; nix gives the exact pinned libghostty. They
      # meet on this env var (ADR-0008/0013).
      - name: build the pinned libghostty-vt
        run: echo "PHPTY_LIBGHOSTTY_VT=$(nix build .#libghostty-vt --print-out-paths)/lib" >> "$GITHUB_ENV"

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: ffi, mbstring, pcntl, posix
          coverage: none

      # The ship inspection: the downgraded suite on a real 7.4, which nixpkgs
      # cannot provide. The bin lock pins PHPUnit 12 (8.3+), so re-resolve here,
      # where 7.4 picks 9.6; the polyfills bridge them (ADR-0010).
      - name: verify the downgraded suite on real 7.4
        run: |
          php -v
          composer update --no-audit
          composer bin phpunit update --no-audit
          vendor-bin/phpunit/vendor/bin/phpunit

      # Commit the downgrade so the subtree split has it at its tip. This commit
      # is local to the runner — it is never pushed to the monorepo.
      - name: commit the downgraded tree
        run: |
          git config user.name "USAMI Kenta"
          git config user.email "tadsan@zonu.me"
          git add -A
          git commit -m "Release ${{ github.event.inputs.tag }} (downgraded to PHP 7.4)"

      # Push each module's downgraded tree to its read-only split repo. We used to
      # run symplify/monorepo-split-github-action here (one step per module), but
      # it runs inside a Docker container where the checkout is owned by the runner
      # (UID 1001) while git runs as root, so git 2.35.2's safe.directory check
      # aborts with "detected dubious ownership" and the split fails. Rather than
      # fight the container, we do the equivalent natively: the action never split
      # real history anyway — it clones the target, wipes it (keeping .git), copies
      # the package directory's contents, commits, and force-pushes branch + tag.
      # That is exactly what this shell step does, on the runner, no container.
      # (See docs/adr/0009-downgrade-on-release-with-rector.md.)
      #
      # The working tree here is the DOWNGRADED tree, already committed locally by
      # the previous step, so copying from it is correct.
      - name: split → phpty-org/{vterm,pty,screen-test}
        env:
          SPLIT_TOKEN: ${{ secrets.SPLIT_TOKEN }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          for pkg in vterm pty screen-test; do
            # Fresh clone of the split target. It already has a main branch (only a
            # .split-init placeholder commit), which the force-push below replaces.
            dir="$(mktemp -d)"
            git clone "https://x-access-token:${SPLIT_TOKEN}@github.com/phpty-org/${pkg}.git" "$dir"

            # Wipe the tracked tree but keep .git, then lay down this module's files.
            git -C "$dir" rm -rqf --ignore-unmatch .
            cp -R "${pkg}/." "$dir"/

            git -C "$dir" config user.name "USAMI Kenta"
            git -C "$dir" config user.email "tadsan@zonu.me"
            git -C "$dir" add -A
            # --allow-empty so a no-op re-run (identical tree) still produces a
            # commit and the force-push/tag below stay idempotent.
            git -C "$dir" commit --allow-empty -m "Release ${TAG} (split from monorepo)"

            # Force-update main and re-point the tag, both non-fast-forward by design.
            git -C "$dir" push --force origin HEAD:main
            git -C "$dir" tag -f "$TAG"
            git -C "$dir" push --force origin "refs/tags/${TAG}"

            rm -rf "$dir"
          done
